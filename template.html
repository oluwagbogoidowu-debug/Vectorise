<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Vectorise Share Card</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&family=JetBrains+Mono:wght@400;700&family=Playfair+Display:ital,wght@1,600&display=swap" rel="stylesheet">
  {{{font_link}}}
  <style>
    :root {
      --bg-gradient: {{{bg_gradient}}};
      --custom-font: {{{custom_font}}};
      --text-font: {{{text_font}}};
    }
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      width: 600px;
      height: 800px;
      background: var(--bg-gradient, linear-gradient(135deg, #040d0a 0%, #081711 50%, #0e261d 100%));
      font-family: var(--custom-font, 'Inter', sans-serif);
      color: #ffffff;
      padding: 40px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      position: relative;
      overflow: hidden;
    }

    /* Grid Overlay */
    body::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-image: 
        linear-gradient(rgba(16, 185, 129, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(16, 185, 129, 0.03) 1px, transparent 1px);
      background-size: 30px 30px;
      z-index: 1;
    }

    /* Decorative Rings */
    .decor-ring {
      position: absolute;
      border: 1px solid rgba(16, 185, 129, 0.05);
      border-radius: 50%;
      z-index: 1;
    }
    .ring-1 { width: 300px; height: 300px; top: -50px; right: -50px; }
    .ring-2 { width: 500px; height: 500px; bottom: -100px; left: -100px; }

    .card-border {
      position: absolute;
      top: 20px;
      left: 20px;
      right: 20px;
      bottom: 20px;
      border: 1px solid rgba(16, 185, 129, 0.15);
      pointer-events: none;
      z-index: 2;
    }

    /* Corner Tabs */
    .corner {
      position: absolute;
      width: 15px;
      height: 15px;
      border: 3px solid #f59e0b;
      z-index: 3;
    }
    .top-left { top: 18px; left: 18px; border-right: none; border-bottom: none; }
    .top-right { top: 18px; right: 18px; border-left: none; border-bottom: none; }
    .bottom-left { bottom: 18px; left: 18px; border-right: none; border-top: none; }
    .bottom-right { bottom: 18px; right: 18px; border-left: none; border-top: none; }

    header {
      text-align: center;
      z-index: 10;
      margin-top: 10px;
    }
    .brand-title {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      color: #10b981;
      letter-spacing: 4px;
      text-transform: uppercase;
    }

    .main-content {
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      margin-bottom: 20px;
    }

    .badge {
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid rgba(16, 185, 129, 0.3);
      padding: 6px 14px;
      border-radius: 9999px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 700;
      color: #34d399;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 24px;
    }

    .sprint-title {
      font-size: 28px;
      font-weight: 900;
      color: #ffffff;
      line-height: 1.25;
      max-width: 440px;
      margin-bottom: 30px;
      text-shadow: 0 4px 12px rgba(0, 0, 0, 0.3);
    }

    /* Outcome text section */
    .outcome-container {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      padding: 30px 24px;
      width: 100%;
      max-width: 460px;
      position: relative;
    }
    .outcome-text {
      font-family: var(--text-font, 'Playfair Display', serif);
      font-style: italic;
      font-size: 17px;
      color: #e5e7eb;
      line-height: 1.6;
      margin-bottom: 16px;
    }
    .user-name {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      color: #f59e0b;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    footer {
      text-align: center;
      z-index: 10;
      margin-bottom: 10px;
    }
    .footer-host {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 700;
      color: rgba(16, 185, 129, 0.5);
      letter-spacing: 2px;
      margin-bottom: 4px;
    }
    .footer-desc {
      font-size: 10px;
      color: #6b7280;
    }
  </style>
</head>
<body>
  <div class="decor-ring ring-1"></div>
  <div class="decor-ring ring-2"></div>
  <div class="card-border"></div>
  
  <div class="corner top-left"></div>
  <div class="corner top-right"></div>
  <div class="corner bottom-left"></div>
  <div class="corner bottom-right"></div>

  <header>
    <div class="brand-title">⚡ V E C T O R I S E   A C H I E V E M E N T ⚡</div>
  </header>

  <div class="main-content">
    <div class="badge">Sprint Accomplished</div>
    <h2 class="sprint-title">{{sprint_name}}</h2>
    
    <div class="outcome-container">
      <p class="outcome-text">“{{outcome}}”</p>
      <div class="user-name">— {{name}}</div>
    </div>
  </div>

  <footer>
    <div class="footer-host">vectorise.app</div>
    <div class="footer-desc">Cognitive enhancement through structured daily iteration.</div>
  </footer>
</body>
</html>
